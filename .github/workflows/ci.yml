name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: internal/go.mod

      - name: Test
        run: make test

      - name: Upload rig artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rig-artifacts
          path: |
            .rig/logs/
            .rig/tmp/
